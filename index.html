    <link rel="icon" type="image/png" href="/mkt_logo.png">
    <script>
      (function() {
        const img = new Image();
        img.src = '/mkt_logo.png';
        img.onload = function() {
          try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
            let hasContent = false;

            for (let y = 0; y < canvas.height; y++) {
              for (let x = 0; x < canvas.width; x++) {
                const idx = (y * canvas.width + x) * 4;
                const r = data[idx];
                const g = data[idx + 1];
                const b = data[idx + 2];
                const alpha = data[idx + 3];

                // Consider it content if not fully transparent and not pure white background
                const isWhite = r > 240 && g > 240 && b > 240;
                if (alpha > 10 && !isWhite) {
                  hasContent = true;
                  if (x < minX) minX = x;
                  if (x > maxX) maxX = x;
                  if (y < minY) minY = y;
                  if (y > maxY) maxY = y;
                }
              }
            }

            if (hasContent) {
              // Add a 5% safety margin around the logo so it doesn't touch the borders
              const pad = Math.round((maxX - minX) * 0.05);
              minX = Math.max(0, minX - pad);
              maxX = Math.min(canvas.width - 1, maxX + pad);
              minY = Math.max(0, minY - pad);
              maxY = Math.min(canvas.height - 1, maxY + pad);

              const cropWidth = maxX - minX + 1;
              const cropHeight = maxY - minY + 1;
              const size = Math.max(cropWidth, cropHeight);

              const cropCanvas = document.createElement('canvas');
              cropCanvas.width = size;
              cropCanvas.height = size;
              const cropCtx = cropCanvas.getContext('2d');

              // Draw cropped logo centered on a square canvas to avoid distortion
              const dx = (size - cropWidth) / 2;
              const dy = (size - cropHeight) / 2;
              cropCtx.drawImage(canvas, minX, minY, cropWidth, cropHeight, dx, dy, cropWidth, cropHeight);

              // Update the favicon link href with the cropped image
              const link = document.querySelector("link[rel*='icon']");
              if (link) {
                link.href = cropCanvas.toDataURL('image/png');
              }
            }
          } catch (e) {
            console.error('Favicon cropper failed:', e);
          }
        };
      })();
    </script>

            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Hide scrollbar but keep scroll */
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .customize-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .customize-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .customize-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .customize-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        ::selection {
            background: rgba(79, 70, 229, 0.1);
            color: #4f46e5;
        }

        @keyframes slideDownFade {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-smooth-in {
            animation: slideDownFade 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(-8px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-pop-in {
            animation: popIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: top;
        }

        /* Spring-like overshoot Version */
        .animate-spring-in {
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: top;
        }

        /* Smooth Auto-Height Transition */
        .expand-section {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }
        
        .expand-section.open {
            grid-template-rows: 1fr;
        }
        
        .expand-section-content {
            min-height: 0;
            visibility: hidden;
            transition: visibility 0.35s;
        }
        
        .expand-section.open .expand-section-content {
            visibility: visible;
        }
